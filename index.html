<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Skeleton Loading</title>
  <style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f0f0f;
    padding:20px;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:20px;
}

.card{
    width:100%;
}

.thumbnail,
.channel,
.title,
.info{
    background:linear-gradient(
        90deg,
        #2b2b2b 25%,
        #3a3a3a 50%,
        #2b2b2b 75%
    );
    background-size:200% 100%;
    animation:loading 1.2s infinite linear;
}

.thumbnail{
    width:100%;
    aspect-ratio:16/9;
    border-radius:12px;
}

.details{
    display:flex;
    gap:12px;
    margin-top:12px;
}

.channel{
    width:40px;
    height:40px;
    border-radius:50%;
}

.text{
    flex:1;
}

.title{
    height:16px;
    width:90%;
    border-radius:5px;
    margin-bottom:10px;
}

.info{
    height:14px;
    width:60%;
    border-radius:5px;
}

@keyframes loading{
    from{
        background-position:200% 0;
    }
    to{
        background-position:-200% 0;
    }
}
  </style>
</head>
<body>

<div class="container" id="container">
  <!-- Skeleton Cards -->
</div>

<script>
  const container = document.getElementById("container");

// Create 12 skeleton cards
for (let i = 0; i < 12; i++) {
  
  const card = document.createElement("div");
  card.className = "card";
  
  card.innerHTML = `
        <div class="thumbnail"></div>

        <div class="details">
            <div class="channel"></div>

            <div class="text">
                <div class="title"></div>
                <div class="info"></div>
            </div>
        </div>
    `;
  
  container.appendChild(card);
}

// Example: Remove skeleton after 3 seconds
setTimeout(() => {
  container.innerHTML = "<h2 style='color:white;'>Videos Loaded 🎉</h2>";
}, 4000);
</script>
</body>
</html>
